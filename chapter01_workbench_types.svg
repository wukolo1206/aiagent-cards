<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">CLI、IDE、Desktop 三種 Agent 工作台</title>
  <desc id="desc">三欄比較命令列代理、編輯器代理與桌面版代理，並標示 Antigravity 屬於教師較容易入門的桌面工作台。</desc>
  <defs>
    <style>
      .bg{fill:#fffdf7}.ink{fill:#20314a}.muted{fill:#667085}.panel{fill:#fff;stroke:#20314a;stroke-width:5;rx:18}.cli{fill:#f7f0de}.ide{fill:#f5dfc9}.desk{fill:#dceee5}.dark{fill:#20314a}.line{stroke:#20314a;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}text{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif}.title{font-size:33px;font-weight:900}.label{font-size:25px;font-weight:900}.small{font-size:18px;font-weight:800}.tiny{font-size:15px;font-weight:700}.mono{font-family:Consolas,monospace;font-size:16px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="900" height="560"/>
  <text class="title ink" x="450" y="64" text-anchor="middle">三種 Agent 工作台，適合不同使用者</text>
  <g transform="translate(48 112)">
    <rect class="panel cli" width="246" height="326"/>
    <text class="label ink" x="123" y="48" text-anchor="middle">CLI</text>
    <rect x="36" y="78" width="174" height="114" rx="12" class="dark"/>
    <text class="mono" x="58" y="116" fill="#dceee5">$ agent run</text>
    <text class="mono" x="58" y="148" fill="#f1d48d">task.md</text>
    <path class="line" d="M58 220h130M58 248h96"/>
    <text class="small ink" x="123" y="292" text-anchor="middle">最快，但偏工程</text>
  </g>
  <g transform="translate(327 112)">
    <rect class="panel ide" width="246" height="326"/>
    <text class="label ink" x="123" y="48" text-anchor="middle">IDE</text>
    <rect x="34" y="78" width="178" height="124" rx="12" fill="#fff" stroke="#20314a" stroke-width="4"/>
    <rect x="34" y="78" width="48" height="124" rx="12" fill="#eef5f7" stroke="#20314a" stroke-width="4"/>
    <path class="line" d="M98 112h78M98 142h58M98 172h88"/>
    <text class="tiny muted" x="58" y="115" text-anchor="middle">檔案</text>
    <path class="line" d="M58 230h130M58 258h96"/>
    <text class="small ink" x="123" y="292" text-anchor="middle">最適合寫程式</text>
  </g>
  <g transform="translate(606 112)">
    <rect class="panel desk" width="246" height="326"/>
    <text class="label ink" x="123" y="48" text-anchor="middle">Desktop</text>
    <rect x="34" y="78" width="178" height="124" rx="12" fill="#fff" stroke="#20314a" stroke-width="4"/>
    <rect x="52" y="100" width="66" height="78" rx="9" fill="#eef5f7" stroke="#20314a" stroke-width="3"/>
    <rect x="132" y="100" width="58" height="32" rx="8" fill="#f1d48d" stroke="#20314a" stroke-width="3"/>
    <rect x="132" y="146" width="58" height="32" rx="8" fill="#dceee5" stroke="#20314a" stroke-width="3"/>
    <path class="line" d="M58 230h130M58 258h96"/>
    <text class="small ink" x="123" y="292" text-anchor="middle">教師入門友善</text>
  </g>
  <rect x="224" y="466" width="452" height="48" rx="12" fill="#f1d48d" stroke="#20314a" stroke-width="4"/>
  <text class="small ink" x="450" y="497" text-anchor="middle">Antigravity：屬於 Desktop 型工作台</text>
</svg>
